# ============================================================================
# Price Is Right — Docker Compose Configuration
# ============================================================================
# Services:
#   chromadb  — ChromaDB vector database server (port 8001)
#   app       — Main Gradio dashboard (port 7860)
#   api       — FastAPI REST API (port 8000)
#   rag-init  — One-shot RAG database initialiser
#
# Usage:
#   ./scripts/deploy.sh       # Build and start all services (first time)
#   ./scripts/start.sh        # Start existing containers
#   ./scripts/stop.sh         # Stop all containers
#   ./scripts/update.sh       # Pull latest code + rolling redeploy
#   ./scripts/chromadb_patch.sh  # Fix ChromaDB healthcheck issues
# ============================================================================

# Note: 'version' key removed — obsolete in Docker Compose v2+ and causes warnings.
services:

  # --------------------------------------------------------------------------
  # ChromaDB — Vector database for RAG product embeddings
  #
  # KNOWN ISSUE (chromadb/chroma:0.5.x and later):
  #   The official Docker Hub image is missing BOTH curl AND wget in many builds.
  #   Using CMD-SHELL with either tool causes the healthcheck to fail immediately
  #   with "executable file not found in $PATH", making the container permanently
  #   unhealthy and blocking app + api from starting.
  #
  # ROOT CAUSE (confirmed via GitHub issue #6855):
  #   The CI pipeline for chromadb/chroma uses rust/Dockerfile which omits curl
  #   from the apt-install step. wget availability is also inconsistent across
  #   image tags.
  #
  # BULLETPROOF FIX APPLIED:
  #   Use a pure Python TCP socket check — Python is ALWAYS present in the
  #   chroma image (it runs on Python). The check:
  #     1. Opens a TCP socket to localhost:8000 (proves the server is listening)
  #     2. Sends a minimal HTTP GET for /api/v2/heartbeat (v2 endpoint, newer)
  #     3. Falls back to /api/v1/heartbeat if v2 returns non-200
  #   No curl, no wget, no apt-helper needed.
  #
  # ADDITIONAL RELIABILITY SETTINGS:
  #   - start_period: 90s  — ChromaDB initialises its SQLite store on first run
  #                          which can take 30-60 s on slow disks or cold starts
  #   - interval: 20s      — Check every 20 s (not too aggressive)
  #   - retries: 15        — Allow up to 15 failures before marking unhealthy
  #                          (15 × 20s = 5 min total tolerance window)
  #   - timeout: 15s       — Give the Python probe time to complete
  # --------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: price-is-right-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    healthcheck:
      # Pure Python TCP + HTTP probe — works regardless of curl/wget availability.
      # Tries /api/v2/heartbeat first (chroma >= 0.5), falls back to /api/v1/heartbeat.
      test:
        - "CMD-SHELL"
        - |
          python3 -c "
          import socket, sys
          try:
              s = socket.create_connection(('localhost', 8000), timeout=10)
              s.sendall(b'GET /api/v2/heartbeat HTTP/1.0\r\nHost: localhost\r\n\r\n')
              r = s.recv(256).decode('utf-8', errors='ignore')
              s.close()
              if '200' in r or 'nanosecond' in r.lower():
                  sys.exit(0)
              # fallback: try v1
              s2 = socket.create_connection(('localhost', 8000), timeout=10)
              s2.sendall(b'GET /api/v1/heartbeat HTTP/1.0\r\nHost: localhost\r\n\r\n')
              r2 = s2.recv(256).decode('utf-8', errors='ignore')
              s2.close()
              sys.exit(0 if ('200' in r2 or 'nanosecond' in r2.lower()) else 1)
          except Exception as e:
              sys.exit(1)
          "
      interval: 20s
      timeout: 15s
      retries: 15
      start_period: 90s
    networks:
      - price-is-right-net

  # --------------------------------------------------------------------------
  # Main Application — Gradio Dashboard
  # --------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: price-is-right:latest
    container_name: price-is-right-app
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      - app_data:/app/data
      - rag_store:/app/products_vectorstore
      # Uncomment the line below to mount source for live development (hot-reload):
      # - ./app:/app/app:ro
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - CHROMA_DB_PATH=/app/products_vectorstore
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MEMORY_FILE=/app/data/memory.json
      - DASHBOARD_PORT=7860
    depends_on:
      chromadb:
        condition: service_healthy
    command: ["python", "-m", "app.main", "--mode", "dashboard"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/ || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - price-is-right-net

  # --------------------------------------------------------------------------
  # API Service — FastAPI REST API
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: price-is-right:latest
    container_name: price-is-right-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
      - rag_store:/app/products_vectorstore
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - CHROMA_DB_PATH=/app/products_vectorstore
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MEMORY_FILE=/app/data/memory.json
      - API_PORT=8000
    depends_on:
      chromadb:
        condition: service_healthy
    command: ["python", "-m", "app.main", "--mode", "api"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - price-is-right-net

  # --------------------------------------------------------------------------
  # RAG Initializer — One-shot service to populate the vector store
  # --------------------------------------------------------------------------
  rag-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: price-is-right:latest
    container_name: price-is-right-rag-init
    volumes:
      - rag_store:/app/products_vectorstore
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - CHROMA_DB_PATH=/app/products_vectorstore
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      chromadb:
        condition: service_healthy
    command: ["python", "-m", "app.main", "--mode", "init-rag"]
    restart: "no"
    networks:
      - price-is-right-net

# ---------------------------------------------------------------------------
# Volumes — persistent data storage
# ---------------------------------------------------------------------------
volumes:
  chromadb_data:
    name: price-is-right-chromadb-data
  app_data:
    name: price-is-right-app-data
  rag_store:
    name: price-is-right-rag-store

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  price-is-right-net:
    name: price-is-right-network
    driver: bridge
