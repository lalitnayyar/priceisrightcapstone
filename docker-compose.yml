# ============================================================================
# Price Is Right — Docker Compose Configuration
# ============================================================================
# Services:
#   chromadb  — ChromaDB vector database server (port 8001)
#   app       — Main Gradio dashboard (port 7860)
#   api       — FastAPI REST API (port 8000)
#   rag-init  — One-shot RAG database initialiser
#
# Usage:
#   ./scripts/deploy.sh    # Build and start all services (first time)
#   ./scripts/start.sh     # Start existing containers
#   ./scripts/stop.sh      # Stop all containers
#   ./scripts/update.sh    # Pull latest code + rolling redeploy
# ============================================================================

# Note: 'version' key removed — obsolete in Docker Compose v2+ and causes warnings.
services:

  # --------------------------------------------------------------------------
  # ChromaDB — Vector database for RAG product embeddings
  #
  # FIX: The chromadb/chroma image does NOT include curl, so the previous
  #      healthcheck using ["CMD", "curl", ...] always failed with
  #      "executable file not found in $PATH", making the container
  #      permanently unhealthy and blocking app + api from starting.
  #
  # Resolution:
  #   1. Use CMD-SHELL with wget (available in the chroma image) instead of curl.
  #   2. Increase start_period to 60s to give ChromaDB time to initialise its
  #      SQLite store on first run (can take 20-40 s on slow disks).
  #   3. Increase retries to 10 so transient slowness does not fail the check.
  #   4. Pin to chromadb/chroma:0.5.20 for reproducibility (latest can break).
  # --------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: price-is-right-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    healthcheck:
      # wget is available in the chroma image; curl is NOT.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - price-is-right-net

  # --------------------------------------------------------------------------
  # Main Application — Gradio Dashboard
  # --------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: price-is-right:latest
    container_name: price-is-right-app
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      - app_data:/app/data
      - rag_store:/app/products_vectorstore
      # Uncomment the line below to mount source for live development (hot-reload):
      # - ./app:/app/app:ro
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - CHROMA_DB_PATH=/app/products_vectorstore
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MEMORY_FILE=/app/data/memory.json
      - DASHBOARD_PORT=7860
    depends_on:
      chromadb:
        condition: service_healthy
    command: ["python", "-m", "app.main", "--mode", "dashboard"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/ || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - price-is-right-net

  # --------------------------------------------------------------------------
  # API Service — FastAPI REST API
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: price-is-right:latest
    container_name: price-is-right-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
      - rag_store:/app/products_vectorstore
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - CHROMA_DB_PATH=/app/products_vectorstore
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MEMORY_FILE=/app/data/memory.json
      - API_PORT=8000
    depends_on:
      chromadb:
        condition: service_healthy
    command: ["python", "-m", "app.main", "--mode", "api"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - price-is-right-net

  # --------------------------------------------------------------------------
  # RAG Initializer — One-shot service to populate the vector store
  # --------------------------------------------------------------------------
  rag-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: price-is-right:latest
    container_name: price-is-right-rag-init
    volumes:
      - rag_store:/app/products_vectorstore
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - CHROMA_DB_PATH=/app/products_vectorstore
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      chromadb:
        condition: service_healthy
    command: ["python", "-m", "app.main", "--mode", "init-rag"]
    restart: "no"
    networks:
      - price-is-right-net

# ---------------------------------------------------------------------------
# Volumes — persistent data storage
# ---------------------------------------------------------------------------
volumes:
  chromadb_data:
    name: price-is-right-chromadb-data
  app_data:
    name: price-is-right-app-data
  rag_store:
    name: price-is-right-rag-store

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  price-is-right-net:
    name: price-is-right-network
    driver: bridge
