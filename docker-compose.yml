# ============================================================================
# Price Is Right — Docker Compose Configuration
# ============================================================================
# Services:
#   chromadb  — ChromaDB vector database server (port 8001)
#   app       — Main Gradio dashboard (port 7860)
#   api       — FastAPI REST API (port 8000)
#   rag-init  — One-shot RAG database initialiser
#
# Usage:
#   ./scripts/deploy.sh          # Build and start all services (first time)
#   ./scripts/start.sh           # Start existing containers
#   ./scripts/stop.sh            # Stop all containers
#   ./scripts/update.sh          # Pull latest code + rolling redeploy
#   ./scripts/chromadb_patch.sh  # Fix ChromaDB healthcheck issues
# ============================================================================

# Note: 'version' key removed — obsolete in Docker Compose v2+ and causes warnings.
services:

  # --------------------------------------------------------------------------
  # ChromaDB — Vector database for RAG product embeddings
  #
  # HEALTHCHECK DESIGN NOTES:
  #   The chromadb/chroma image is missing curl AND wget in most builds.
  #   Python 3 is always present (ChromaDB is a Python app).
  #
  #   IMPORTANT: The CMD-SHELL probe MUST be a single-line string.
  #   Multi-line YAML block scalars (|) are unreliable with CMD-SHELL because
  #   Docker passes the entire block as one argument to /bin/sh -c, and
  #   embedded newlines cause parsing failures in some Docker versions.
  #
  #   The probe below uses a single-line Python one-liner with semicolons.
  #   It tries /api/v2/heartbeat (chroma >= 0.5) and /api/v1/heartbeat (older).
  #
  # DEPENDENCY STRATEGY:
  #   app and api use condition: service_started (not service_healthy).
  #   This means they start immediately and retry their own ChromaDB connection
  #   internally. This prevents a cascading failure where a slow ChromaDB
  #   startup blocks the entire stack.
  # --------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: price-is-right-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket,sys; s=socket.create_connection(('localhost',8000),timeout=5); s.sendall(b'GET /api/v1/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n'); r=s.recv(128).decode('utf-8','ignore'); s.close(); sys.exit(0 if '200' in r or 'nanosecond' in r.lower() else 1)\""]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    networks:
      - price-is-right-net

  # --------------------------------------------------------------------------
  # Main Application — Gradio Dashboard
  # --------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: price-is-right:latest
    container_name: price-is-right-app
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      - app_data:/app/data
      - rag_store:/app/products_vectorstore
      # Uncomment the line below to mount source for live development (hot-reload):
      # - ./app:/app/app:ro
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - CHROMA_DB_PATH=/app/products_vectorstore
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MEMORY_FILE=/app/data/memory.json
      - DASHBOARD_PORT=7860
    depends_on:
      chromadb:
        condition: service_started
    command: ["python", "-m", "app.main", "--mode", "dashboard"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/ || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - price-is-right-net

  # --------------------------------------------------------------------------
  # API Service — FastAPI REST API
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: price-is-right:latest
    container_name: price-is-right-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
      - rag_store:/app/products_vectorstore
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - CHROMA_DB_PATH=/app/products_vectorstore
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MEMORY_FILE=/app/data/memory.json
      - API_PORT=8000
    depends_on:
      chromadb:
        condition: service_started
    command: ["python", "-m", "app.main", "--mode", "api"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - price-is-right-net

  # --------------------------------------------------------------------------
  # RAG Initializer — One-shot service to populate the vector store
  # --------------------------------------------------------------------------
  rag-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: price-is-right:latest
    container_name: price-is-right-rag-init
    volumes:
      - rag_store:/app/products_vectorstore
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - CHROMA_DB_PATH=/app/products_vectorstore
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      chromadb:
        condition: service_started
    command: ["python", "-m", "app.main", "--mode", "init-rag"]
    restart: "no"
    networks:
      - price-is-right-net

# ---------------------------------------------------------------------------
# Volumes — persistent data storage
# ---------------------------------------------------------------------------
volumes:
  chromadb_data:
    name: price-is-right-chromadb-data
  app_data:
    name: price-is-right-app-data
  rag_store:
    name: price-is-right-rag-store

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  price-is-right-net:
    name: price-is-right-network
    driver: bridge
